<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAIS - Login</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="topo-login">
        <h1>FAIS</h1>
    </header>

    <main class="login-page">
        <section class="form-container" aria-labelledby="titulo-login">
            <h2 id="titulo-login">Bem-vindo!</h2>
            <p>Faça login para acessar.</p>

            <form action="dashboard.html">
                <label for="usuario">Usuário</label>
                <input type="text" id="usuario" name="usuario" placeholder="Informe o nome do usuário..." required>

                <label for="senha">Senha</label>
                <input type="password" id="senha" name="senha" placeholder="********" required>

                <a class="link-esqueceu-senha" href="#">Esqueceu a senha?</a>

                <button type="submit">Entrar</button>
            </form>
        </section>

        <aside class="logo-area">
            <img src="./assets/logotipo.png" alt="Logotipo da empresa">
        </aside>
    </main>

    <footer class="rodape">
        <p>Projeto acadêmico - FAIS</p>
    </footer>
</body>

</html>
